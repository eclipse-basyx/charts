name: Lint and Test Charts

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - 'charts/**'
      - '!**/README.md'
      - '.github/workflows/tests.yml'
      - 'lintconf.yaml'
  
  push:
    branches:
      - main
    paths:
      - 'charts/**'
      - '!**/README.md'
      - '.github/workflows/tests.yml'
      - 'lintconf.yaml'

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Helm
        uses: azure/setup-helm@v4.3.0
        with:
          version: v3.17.0

      # Python is required because `ct lint` runs Yamale (https://github.com/23andMe/Yamale) and
      # yamllint (https://github.com/adrienverge/yamllint) which require Python
      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.13.7'
          check-latest: true
      
      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.7.0

      - name: Install helm-unittest
        run: helm plugin install https://github.com/helm-unittest/helm-unittest.git --version v0.8.0
      
      - name: Set target branch
        id: set-target-branch
        run: |
          if [ -n "${{ github.event.pull_request.base.ref }}" ]; then
            echo "target-branch=${{ github.event.pull_request.base.ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "target-branch=${{ github.event.repository.default_branch }}" >> "$GITHUB_OUTPUT"
          fi
      
      - name: Run chart-testing (list-changed)
        id: list-changed
        run: |
          changed=$(ct list-changed --target-branch ${{ steps.set-target-branch.outputs.target-branch }})
          if [[ -n "$changed" ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Run chart-testing (lint)
        run: ct lint --validate-maintainers=false --lint-conf lintconf.yaml --target-branch ${{ steps.set-target-branch.outputs.target-branch }}

      - name: Run helm-unittest
        run: |
          for dir in charts/*/; do
            if [ -d "$dir/tests" ]; then
              helm unittest "$dir"
            fi
          done

      - name: Create kind cluster
        uses: helm/kind-action@v1.12.0
        if: steps.list-changed.outputs.changed == 'true'

      - name: Install cert-manager
        if: steps.list-changed.outputs.changed == 'true'
        run: |
          helm repo add jetstack https://charts.jetstack.io
          helm repo update
          helm upgrade --install cert-manager jetstack/cert-manager \
            --namespace cert-manager \
            --create-namespace \
            --version v1.19.3 \
            --set crds.enabled=true \
            --wait \
            --timeout 5m
          kubectl wait --for=condition=Established crd/certificates.cert-manager.io --timeout=2m
          kubectl wait --for=condition=Established crd/issuers.cert-manager.io --timeout=2m

      - name: Install CloudNativePG
        if: steps.list-changed.outputs.changed == 'true'
        run: |
          helm repo add cnpg https://cloudnative-pg.github.io/charts
          helm repo update
          helm upgrade --install cnpg cnpg/cloudnative-pg \
            --namespace cnpg-system \
            --create-namespace \
            --wait \
            --timeout 5m
          kubectl wait --for=condition=Established crd/clusters.postgresql.cnpg.io --timeout=2m
      
      - name: Add repositories
        run: |
          for dir in $(ls -d charts/*/); do
            helm dependency list $dir 2> /dev/null | tail +2 | head -n -1 | awk '$3 !~ /^file:/ && $3 !~ /^oci:/ { print "helm repo add " $1 " " $3 }' | while read cmd; do $cmd; done
          done

      - name: Run chart-testing (install)
        run: |
          ct install \
            --target-branch ${{ steps.set-target-branch.outputs.target-branch }} \
            --helm-extra-set-args '--set database.instances=1 --set database.storage.size=1Gi --set configurationService.waitForDatabase.timeoutSeconds=300'
        if: steps.list-changed.outputs.changed == 'true'
