{{- if .Values.aasRegistry.enabled -}}
{{- if .Values.aasRegistry.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "basyx-aasRegistry.serviceAccountName" . }}
  labels:
    {{- include "basyx-aasRegistry.labels" . | nindent 4 }}
  {{- with .Values.aasRegistry.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.aasRegistry.serviceAccount.automount }}
{{- end }}
{{- end }}