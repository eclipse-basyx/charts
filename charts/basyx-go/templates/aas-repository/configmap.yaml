{{- if .Values.aasRepository.enabled -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "basyx-aasRepository.fullname" . }}-config
  labels:
    {{- include "basyx-aasRepository.labels" . | nindent 4 }}
data:
  {{- range $key, $value := .Values.environment }}
  {{ $key }}: {{ tpl (print $value) $ | quote }}
  {{- end }}
{{- end }}