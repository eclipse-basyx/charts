{{- if .Values.digitalTwinRegistry.enabled -}}
{{- if .Values.digitalTwinRegistry.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "basyx-digitalTwinRegistry.serviceAccountName" . }}
  labels:
    {{- include "basyx-digitalTwinRegistry.labels" . | nindent 4 }}
  {{- with .Values.digitalTwinRegistry.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.digitalTwinRegistry.serviceAccount.automount }}
{{- end }}
{{- end }}