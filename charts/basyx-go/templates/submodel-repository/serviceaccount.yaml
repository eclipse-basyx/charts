{{- if .Values.submodelRepository.enabled -}}
{{- if .Values.submodelRepository.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "basyx-submodelRepository.serviceAccountName" . }}
  labels:
    {{- include "basyx-submodelRepository.labels" . | nindent 4 }}
  {{- with .Values.submodelRepository.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.submodelRepository.serviceAccount.automount }}
{{- end }}
{{- end }}