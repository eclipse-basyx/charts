{{- if .Values.cdRepository.enabled -}}
{{- if .Values.cdRepository.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "basyx-cdRepository.serviceAccountName" . }}
  labels:
    {{- include "basyx-cdRepository.labels" . | nindent 4 }}
  {{- with .Values.cdRepository.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.cdRepository.serviceAccount.automount }}
{{- end }}
{{- end }}