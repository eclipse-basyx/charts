suite: service accounts
release:
  name: basyx
templates:
  - templates/aas-discovery/serviceaccount.yaml
  - templates/aas-discovery/deployment.yaml
tests:
  - it: uses the component-specific custom service account name when provided
    set:
      aasDiscovery.enabled: true
      aasDiscovery.serviceAccount.name: discovery-custom
    template: templates/aas-discovery/serviceaccount.yaml
    documentSelector:
      path: metadata.name
      value: discovery-custom
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: automountServiceAccountToken
          value: false

  - it: uses a custom service account name in the deployment without creating one when create is false
    set:
      aasDiscovery.serviceAccount.create: false
      aasDiscovery.serviceAccount.name: discovery-external
    template: templates/aas-discovery/serviceaccount.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: points the discovery deployment to the externally managed service account
    set:
      aasDiscovery.enabled: true
      aasDiscovery.serviceAccount.create: false
      aasDiscovery.serviceAccount.name: discovery-external
    template: templates/aas-discovery/deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: discovery-external
