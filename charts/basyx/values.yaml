database:
  clusterName: basyx-database
  # postgres, managed and cnpg deploy a CloudNativePG cluster. Use external to
  # connect BaSyx Go to an existing PostgreSQL database through existingSecret.
  type: postgres
  # Existing Secret for database.type=external. It must contain the keys:
  # host, port, dbname, user, password and jdbc-uri.
  existingSecret: ""
  # Inline external database connection values for database.type=external.
  # If existingSecret is set, these values are ignored.
  # Prefer existingSecret for production and GitOps because inline passwords are
  # stored in Helm release data.
  external:
    host: ""
    port: "5432"
    dbname: ""
    user: ""
    password: ""
    # Optional BaSyx Go PostgreSQL settings. These are rendered as optional
    # POSTGRES_* environment variables for backend services.
    # sslmode: require
    # sslcert: /etc/ssl/certs/postgres/client.crt
    # sslkey: /etc/ssl/certs/postgres/client.key
    # sslrootcert: /etc/ssl/certs/postgres/ca.crt
    # connectTimeoutSeconds: 10
    # applicationName: basyx-go
    # fallbackApplicationName: basyx-go
    # searchPath: basyx
    # options: "-c statement_timeout=30000"
    # timezone: UTC
  # Backend services can override this global database connection individually:
  #
  # aasRegistry:
  #   database:
  #     existingSecret: basyx-aas-registry-postgres
  #
  # Or inline for test deployments:
  #
  # aasRegistry:
  #   database:
  #     type: external
  #     host: postgres.example.internal
  #     port: "5432"
  #     dbname: basyx
  #     user: basyx
  #     password: change-me
  #     sslmode: require
  #     searchPath: registry_schema
  # name for the cnpg cluster resource
  # clusterName: "basyx-database"
  # name of database
  # database: "basyx"
  # owner of database
  # owner: "basyx"
  # Number of instances per cluster
  instances: 3
  # Storage configuration
  storage:
    # Volume size per instance
    size: 10Gi

# PodDisruptionBudget: not managed by this chart. For HA deployments, create
# PDBs separately to guarantee availability during node drains. Example:
#
#   apiVersion: policy/v1
#   kind: PodDisruptionBudget
#   metadata:
#     name: basyx-aas-registry-pdb
#     namespace: <your-namespace>
#   spec:
#     minAvailable: 1
#     selector:
#       matchLabels:
#         app.kubernetes.io/name: aas-registry
#         app.kubernetes.io/instance: basyx

# Attribute-Based Access Control (ABAC) configuration.
# When enabled, all services enforce access rules based on JWT token claims.
# accessRules: JSON defining which roles can access which HTTP methods and paths.
# trustList: list of trusted OIDC issuers with audience and scope configuration.
# Individual services can override global ABAC settings via <service>.abac.*
abac:
  enabled: false
  # Startup import behavior for accessRulesFileName:
  # "" uses the service default, otherwise one of always, if_missing, never.
  policyFileImport: ""
  # Optional database namespace for stored ABAC policies. Leave empty to use
  # the service default scope.
  policyScope: ""
  managementApi:
    enabled: false
  mountPath: /security_env
  accessRulesFileName: access-rules.json
  trustListFileName: trustlist.json

  accessRules: |
    {
      "AllAccessPermissionRules": {
        "DEFATTRIBUTES": [
          { "name": "role_attr", "attributes": [{ "CLAIM": "role" }] }
        ],
        "DEFOBJECTS": [
          {
            "name": "all_api",
            "objects": [
              { "ROUTE": "/description" },
              { "ROUTE": "/shell-descriptors" },
              { "ROUTE": "/shell-descriptors/*" },
              { "ROUTE": "/submodel-descriptors" },
              { "ROUTE": "/submodel-descriptors/*" },
              { "ROUTE": "/lookup/shells" },
              { "ROUTE": "/lookup/shells/*" },
              { "ROUTE": "/lookup/shellsByAssetLink" },
              { "ROUTE": "/shells" },
              { "ROUTE": "/shells/*" },
              { "ROUTE": "/submodels" },
              { "ROUTE": "/submodels/*" },
              { "ROUTE": "/concept-descriptions" },
              { "ROUTE": "/concept-descriptions/*" },
              { "ROUTE": "/companies" },
              { "ROUTE": "/companies/*" },
              { "ROUTE": "/v1/dpps" },
              { "ROUTE": "/v1/dpps/*" },
              { "ROUTE": "/v1/dppsByProductId/*" },
              { "ROUTE": "/v1/dppsByIdAndDate/*" },
              { "ROUTE": "{{ .Values.paths.aasRegistry }}/description" },
              { "ROUTE": "{{ .Values.paths.aasRegistry }}/shell-descriptors" },
              { "ROUTE": "{{ .Values.paths.aasRegistry }}/shell-descriptors/*" },
              { "ROUTE": "{{ .Values.paths.submodelRegistry }}/description" },
              { "ROUTE": "{{ .Values.paths.submodelRegistry }}/submodel-descriptors" },
              { "ROUTE": "{{ .Values.paths.submodelRegistry }}/submodel-descriptors/*" },
              { "ROUTE": "{{ .Values.paths.aasDiscovery }}/description" },
              { "ROUTE": "{{ .Values.paths.aasDiscovery }}/lookup/shells" },
              { "ROUTE": "{{ .Values.paths.aasDiscovery }}/lookup/shells/*" },
              { "ROUTE": "{{ .Values.paths.aasDiscovery }}/lookup/shellsByAssetLink" },
              { "ROUTE": "{{ .Values.paths.aasRepository }}/description" },
              { "ROUTE": "{{ .Values.paths.aasRepository }}/shells" },
              { "ROUTE": "{{ .Values.paths.aasRepository }}/shells/*" },
              { "ROUTE": "{{ .Values.paths.submodelRepository }}/description" },
              { "ROUTE": "{{ .Values.paths.submodelRepository }}/submodels" },
              { "ROUTE": "{{ .Values.paths.submodelRepository }}/submodels/*" },
              { "ROUTE": "{{ .Values.paths.cdRepository }}/description" },
              { "ROUTE": "{{ .Values.paths.cdRepository }}/concept-descriptions" },
              { "ROUTE": "{{ .Values.paths.cdRepository }}/concept-descriptions/*" },
              { "ROUTE": "{{ .Values.paths.companyLookup }}/description" },
              { "ROUTE": "{{ .Values.paths.companyLookup }}/companies" },
              { "ROUTE": "{{ .Values.paths.companyLookup }}/companies/*" },
              { "ROUTE": "{{ .Values.paths.dppApi }}/description" },
              { "ROUTE": "{{ .Values.paths.dppApi }}/v1/dpps" },
              { "ROUTE": "{{ .Values.paths.dppApi }}/v1/dpps/*" },
              { "ROUTE": "{{ .Values.paths.dppApi }}/v1/dppsByProductId/*" },
              { "ROUTE": "{{ .Values.paths.dppApi }}/v1/dppsByIdAndDate/*" }
            ]
          }
        ],
        "DEFACLS": [
          { "name": "admin_full", "acl": { "USEATTRIBUTES": "role_attr", "RIGHTS": ["ALL"], "ACCESS": "ALLOW" } }
        ],
        "DEFFORMULAS": [
          { "name": "is_admin", "formula": { "$eq": [{ "$attribute": { "CLAIM": "role" } }, { "$strVal": "admin" }] } }
        ],
        "rules": [
          { "USEACL": "admin_full", "USEOBJECTS": ["all_api"], "USEFORMULA": "is_admin" }
        ]
      }
    }

  trustList: |
    [
      {
        "issuer": "https://{{ .Values.host }}{{ .Values.paths.keycloak }}/realms/{{ .Values.keycloak.realm }}",
        "audience": "{{ .Values.environment.common.OIDC_AUDIENCE | default .Values.keycloak.secrets.client.name }}",
        "scopes": ["email", "profile"]
      }
    ]

  services: {}
    # Legacy per-service override location. Prefer `<service>.abac` instead.
    # Supported service keys:
    # aasDiscovery, aasRegistry, aasRepository, aasEnvironment, dppApi,
    # submodelRegistry, submodelRepository, cdRepository, companyLookup,
    # digitalTwinRegistry
