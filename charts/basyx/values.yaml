# This is to override the chart name.
nameOverride: ""
fullnameOverride: ""
# This section builds out the service account more information can be found here: https://kubernetes.io/docs/concepts/security/service-accounts/
serviceAccount:
  # Specifies whether a service account should be created.
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: false
  # Annotations to add to the service account.
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template.
  name: ""

# This block is for setting up the ingress for more information can be found here: https://kubernetes.io/docs/concepts/services-networking/ingress/

# -- Expose the service via gateway-api HTTPRoute
# Requires Gateway API resources and suitable controller installed within the cluster
# (see: https://gateway-api.sigs.k8s.io/guides/)

instanceName: "example"
host: "basyx.example.com"

tls:
  enabled: true
  hosts:
    - "{{ .Values.host }}"
  # Optional existing TLS Secret for all generated ingress resources. Defaults
  # to "<release-name>-tls-secret" when empty.
  secretName: ""

internal:
  CACertificates:
    trustStore:
      # Keep the default system trust directory in SSL_CERT_DIR.
      useDefaultCAs: true
      # Mount point for additional CA sources.
      mountPath: /etc/ssl/certs/custom
      # Optional chart-local directory whose files are projected into the trust store.
      # Supports templating, e.g. /config-files/certs/{{ .Values.instanceName }}
      chartFileDirectory: ""
      # Optional inline PEM bundle rendered into a generated ConfigMap.
      additionalCACertificates: ""
      # Optional existing Secret names projected into the trust store.
      extraSecrets: []
      # Optional existing ConfigMap names projected into the trust store.
      extraConfigMaps: []
  certificateIssuer:
    name: internal-issuer
    autocreateCa: false
    autocreateCaSecretName: internal-issuer-ca
    spec:
      ca:
        # references existing ca secret
        secretName: internal-issuer-ca


ingress:
  # Global ingress defaults inherited by all service ingress resources. Services
  # can still override className and annotations under <service>.ingress.
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
  clusterIssuer: ""
  issuer: ""
  certificateIssuer:
    enabled: false
    name: ingress-issuer
    spec: {}

paths:
  dashboard: /aas-dataspace-dashboard
  aasDiscovery: /aas-discovery
  aasRegistry: /aas-registry
  aasRepository: /aas-repository
  aasEnvironment: /aas-environment
  dppApi: /dpp-api
  submodelRegistry: /submodel-registry
  submodelRepository: /submodel-repo
  cdRepository: /cd-repository
  companyLookup: /company-lookup
  confSubmodelRepository: /conf-submodel-repo
  aasWebUi: /aas-gui/
  aasWebUiBasePath: /aas-gui
  keycloak: /identity-management
  digitalTwinRegistry: /digital-twin-registry

environment:
  common:
    # Restrict to specific origins in production, e.g.: "https://my-app.example.com"
    # Never combine wildcard '*' with CORS_ALLOWEDCREDENTIALS: true (CSRF risk, browsers block it).
    CORS_ALLOWEDORIGINS: ""
    CORS_ALLOWEDHEADERS: "*"
    CORS_ALLOWEDCREDENTIALS: false
    CORS_ALLOWEDMETHODS: GET,POST,PUT,PATCH,DELETE,OPTIONS
    POSTGRES_MAXOPENCONNECTIONS: 500
    POSTGRES_MAXIDLECONNECTIONS: 500
    POSTGRES_CONNMAXLIFETIMEMINUTES: 5
    SERVER_STRICTVERIFICATION: permissive
    OIDC_AUDIENCE: discovery-service
    ABAC_ENABLED: false

# Shared BaSyx Go runtime configuration rendered into the common environment
# for backend services. Explicit keys in environment.common override these
# structured values.
general:
  enableImplicitCasts: true
  enableDescriptorDebug: false
  discoveryIntegration: false
  enableCustomMiddlewareHeaderInjection: false
  supportsSingularSupplementalSemanticId: false
  aasRegistryIntegration: false
  submodelRegistryIntegration: false
  externalUrl: ""
  trustProxyHeaders: false
  trustedProxyCIDRs: []
  uploadMaxSizeBytes: 134217728
  aasxMaxPartCount: 10000
  aasxMaxOPCMetadataSizeBytes: 16777216
  aasxMaxPartExpandedSizeBytes: 134217728
  aasxMaxTotalExpandedSizeBytes: 134217728
  aasxMaxThumbnailSizeBytes: 16777216
  bulkBatchLimit: 1000
  # Comma-rendered into GENERAL_AAS_PRECONFIG_PATHS. Mount matching files or
  # directories with the service-specific volumes/volumeMounts when used.
  aasPreconfigPaths: []

# Shared BaSyx Go HTTP server timeout configuration. Values are rendered into
# SERVER_* environment variables for backend services and must be greater than 0.
server:
  readHeaderTimeoutSeconds: 15
  readTimeoutSeconds: 300
  writeTimeoutSeconds: 300
  idleTimeoutSeconds: 60
  shutdownTimeoutSeconds: 10

# AAS v3.2 history/audit runtime configuration. Defaults keep history disabled.
history:
  mode: "off"
  retentionDays: 0
  fullSnapshotInterval: 1
  immutability: "none"
  auditIdentityMode: "none"
  evidence:
    enabled: false
    provider: "none"
    bucket: ""
    prefix: basyx-history-evidence
    region: us-east-1
    endpoint: ""
    accessKeyId: ""
    secretAccessKey: ""
    pathStyle: false
    retentionMode: ""
    retentionDays: 0
    writeTimeoutSeconds: 10
    signing:
      privateKeyPath: ""
      publicKeyPath: ""
      required: false
  integrityAnchor:
    provider: "none"

# Future-compatible eventing settings. BaSyx Go currently fails fast when
# event publishing or outbox processing is enabled before an implementation is
# available.
eventing:
  enabled: false
  format: cloudevents
  sinks: []
  outboxEnabled: false
  topicPrefix: basyx


# HTTP proxy settings for outbound connections from all services.
# Set to empty string "" to disable. noProxy should include cluster-internal
# domains to avoid proxying internal traffic, e.g.: ".svc.cluster.local,keycloak"
proxy:
  http: ""
  https: ""
  noProxy: "localhost,127.0.0.1,.svc.cluster.local"

configurationService:
  # The BaSyx Go Configuration Service initializes and migrates the shared
  # PostgreSQL schema before DB-backed runtime services use it.
  enabled: true
  image:
    repository: eclipsebasyx/basyxconfigurationservice-go
    pullPolicy: IfNotPresent
    tag: ""
    digest: ""
  imagePullSecrets: []
  command: []
  args: []
  waitForDatabase:
    enabled: true
    image:
      repository: ghcr.io/cloudnative-pg/postgresql
      pullPolicy: IfNotPresent
      tag: "18.4-system-trixie"
      digest: ""
    intervalSeconds: 5
    timeoutSeconds: 600
    resources: {}
  hook:
    enabled: true
    # post-install is needed because the CNPG database is created by this chart.
    # pre-upgrade runs migrations before new runtime pods start.
    events:
      - post-install
      - pre-upgrade
    weight: "-10"
    deletePolicy:
      - before-hook-creation
    annotations: {}
  backoffLimit: 12
  activeDeadlineSeconds: 900
  ttlSecondsAfterFinished: 600
  restartPolicy: OnFailure
  podAnnotations: {}
  podLabels: {}
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

keycloak:
  enabled: false
  realm: basyx
  webUiClientId: basyx-ui
  initJob:
    image:
      repository: registry.gitlab.com/gitlab-ci-utils/curl-jq
      pullPolicy: IfNotPresent
      tag: "4.0.3"
      digest: ""
  tests:
    realmCheck:
      image:
        repository: curlimages/curl
        pullPolicy: IfNotPresent
        tag: 8.21.0
        digest: ""
  initialization:
    userProfile:
      unmanagedAttributePolicy: ADMIN_EDIT

    roles:
      - admin
      - viewer

    clients:

      - clientId: basyx-ui
        publicClient: true
        standardFlowEnabled: true
        implicitFlowEnabled: true

        redirectUris:
          - "https://{{ .Values.host }}{{ .Values.paths.aasWebUiBasePath }}/*"

        webOrigins:
          - "+"

        attributes:
          post.logout.redirect.uris: "https://{{ .Values.host }}{{ .Values.paths.aasWebUiBasePath }}/*"
          oauth2.device.authorization.grant.enabled: "true"
        protocolMappers:
          - name: Role Mapper
            protocol: openid-connect
            protocolMapper: oidc-usermodel-attribute-mapper
            consentRequired: false
            config:
              aggregate.attrs: "false"
              introspection.token.claim: "true"
              multivalued: "false"
              userinfo.token.claim: "true"
              user.attribute: role
              id.token.claim: "true"
              lightweight.claim: "false"
              access.token.claim: "true"
              claim.name: role
              jsonType.label: String
          - name: discovery-service-aud-mapper
            protocol: openid-connect
            protocolMapper: oidc-audience-mapper
            consentRequired: false
            config:
              included.client.audience: discovery-service
              id.token.claim: "false"
              lightweight.claim: "false"
              introspection.token.claim: "true"
              access.token.claim: "true"
              userinfo.token.claim: "false"
          - name: Clearance Mapper
            protocol: openid-connect
            protocolMapper: oidc-usermodel-attribute-mapper
            consentRequired: false
            config:
              aggregate.attrs: "false"
              introspection.token.claim: "true"
              multivalued: "false"
              userinfo.token.claim: "true"
              user.attribute: clear
              id.token.claim: "true"
              lightweight.claim: "false"
              access.token.claim: "true"
              claim.name: clear
              jsonType.label: String

      - clientId: discovery-service
        serviceAccountsEnabled: true

    users:
      - username: basyx.admin
        enabled: true
        email: basyx_admin@example.com
        firstName: BaSyx
        lastName: Admin
        emailVerified: true
        attributes:
          role:
            - admin
          clear:
            - admin
        roles:
          - admin
        credentials:
          - type: password
            value: changeit
            temporary: false
  environment:
    KC_PROXY: edge
    jgroups_dns_query: keycloak
    PROXY_ADDRESS_FORWARDING: true
    KC_HEALTH_ENABLED: true
    KC_HTTP_ENABLED: true
    KC_DB: postgres
    KC_HTTP_MANAGEMENT_ENABLED: "true"
    KC_PROXY_HEADERS: xforwarded
    KC_HOSTNAME_STRICT: "false"
    KC_HOSTNAME_STRICT_BACKCHANNEL: "false"
  monitoring:
    enabled: true
  secrets:
    # name for the creditals secret
    name: "keycloak-credentials"
    # configures admin user for keycloak
    admin:
      username: admin
      password: changeit
    # configures client credentials for keycloak
    client:
      name: basyx-ui
      clientPassword: changeit
  replicaCount: 1
  image:
    repository: keycloak/keycloak
    pullPolicy: IfNotPresent
    tag: 26.5
  imagePullSecrets: []
  nameOverride: "keycloak"
  fullnameOverride: "keycloak"
  serviceAccount:
    # Specifies whether a service account should be created
    create: true
    # Automatically mount a ServiceAccount's API credentials?
    automount: false
    # Annotations to add to the service account
    annotations: {}
    # The name of the service account to use.
    # If not set and create is true, a name is generated using the fullname template
    name: "keycloak"
  podAnnotations: {}
  podLabels: {}
  # Keycloak runs as root by default. Consult the official image documentation
  # before restricting the security context for production deployments.
  podSecurityContext: {}
  securityContext: {}
  service:
    type: ClusterIP
    port: 9096
  managementPort: 9000

  ingress:
    enabled: true
    className: ""
    annotations: {}
    hosts:
      - host: "{{ .Values.host }}"
        paths:
          - path: "{{ .Values.paths.keycloak }}"
            pathType: Prefix

  resources:
    {}
    # limits:
    #   cpu: 100m
    #   memory: 128Mi
    # requests:
    #   cpu: 100m
    #   memory: 128Mi
  startupProbe:
    httpGet:
      path: "{{ .Values.paths.keycloak }}/health/started"
      port: management
    failureThreshold: 30
    periodSeconds: 10
  livenessProbe:
    httpGet:
      path: "{{ .Values.paths.keycloak }}/health/live"
      port: management
    initialDelaySeconds: 0
    periodSeconds: 10
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: "{{ .Values.paths.keycloak }}/health/ready"
      port: management
    initialDelaySeconds: 0
    periodSeconds: 5
    failureThreshold: 3
  command:
    - "/opt/keycloak/bin/kc.sh"
    - "start"
    - "--http-enabled=true"
    - "--http-port=9096"
    - "--hostname-strict=false"
  nodeSelector: {}
  tolerations: []
  affinity: {}

