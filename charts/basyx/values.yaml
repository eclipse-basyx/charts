database:
  clusterName: basyx-database
  type: postgres
  # name for the cnpg cluster ressource
  # clusterName: "basyx-database"
  # name of database
  # database: "basyx"
  # owner of database
  # owner: "basyx"
  # Number of instances per cluster
  instances: 3
  # Storage configuration
  storage:
    # Volume size per instance
    size: 10Gi

# PodDisruptionBudget: not managed by this chart. For HA deployments, create
# PDBs separately to guarantee availability during node drains. Example:
#
#   apiVersion: policy/v1
#   kind: PodDisruptionBudget
#   metadata:
#     name: basyx-aas-registry-pdb
#     namespace: <your-namespace>
#   spec:
#     minAvailable: 1
#     selector:
#       matchLabels:
#         app.kubernetes.io/name: aas-registry
#         app.kubernetes.io/instance: basyx

# Attribute-Based Access Control (ABAC) configuration.
# When enabled, all services enforce access rules based on JWT token claims.
# accessRules: JSON defining which roles can access which HTTP methods and paths.
# trustList: list of trusted OIDC issuers with audience and scope configuration.
# Individual services can override global ABAC settings via <service>.abac.*
abac:
  enabled: false
  mountPath: /security_env
  accessRulesFileName: access-rules.json
  trustListFileName: trustlist.json

  accessRules: |
    {
      "AllAccessPermissionRules": {
        "DEFATTRIBUTES": [
          { "name": "role_attr", "attributes": [{ "CLAIM": "role" }] }
        ],
        "DEFOBJECTS": [
          {
            "name": "all_api",
            "objects": [
              { "ROUTE": "/description" },
              { "ROUTE": "/shell-descriptors" },
              { "ROUTE": "/shell-descriptors/*" },
              { "ROUTE": "/submodel-descriptors" },
              { "ROUTE": "/submodel-descriptors/*" },
              { "ROUTE": "/lookup/shells" },
              { "ROUTE": "/lookup/shells/*" },
              { "ROUTE": "/lookup/shellsByAssetLink" },
              { "ROUTE": "/shells" },
              { "ROUTE": "/shells/*" },
              { "ROUTE": "/submodels" },
              { "ROUTE": "/submodels/*" },
              { "ROUTE": "/concept-descriptions" },
              { "ROUTE": "/concept-descriptions/*" },
              { "ROUTE": "/companies" },
              { "ROUTE": "/companies/*" },
              { "ROUTE": "{{ .Values.paths.aasRegistry }}/description" },
              { "ROUTE": "{{ .Values.paths.aasRegistry }}/shell-descriptors" },
              { "ROUTE": "{{ .Values.paths.aasRegistry }}/shell-descriptors/*" },
              { "ROUTE": "{{ .Values.paths.submodelRegistry }}/description" },
              { "ROUTE": "{{ .Values.paths.submodelRegistry }}/submodel-descriptors" },
              { "ROUTE": "{{ .Values.paths.submodelRegistry }}/submodel-descriptors/*" },
              { "ROUTE": "{{ .Values.paths.aasDiscovery }}/description" },
              { "ROUTE": "{{ .Values.paths.aasDiscovery }}/lookup/shells" },
              { "ROUTE": "{{ .Values.paths.aasDiscovery }}/lookup/shells/*" },
              { "ROUTE": "{{ .Values.paths.aasDiscovery }}/lookup/shellsByAssetLink" },
              { "ROUTE": "{{ .Values.paths.aasRepository }}/description" },
              { "ROUTE": "{{ .Values.paths.aasRepository }}/shells" },
              { "ROUTE": "{{ .Values.paths.aasRepository }}/shells/*" },
              { "ROUTE": "{{ .Values.paths.submodelRepository }}/description" },
              { "ROUTE": "{{ .Values.paths.submodelRepository }}/submodels" },
              { "ROUTE": "{{ .Values.paths.submodelRepository }}/submodels/*" },
              { "ROUTE": "{{ .Values.paths.cdRepository }}/description" },
              { "ROUTE": "{{ .Values.paths.cdRepository }}/concept-descriptions" },
              { "ROUTE": "{{ .Values.paths.cdRepository }}/concept-descriptions/*" },
              { "ROUTE": "{{ .Values.paths.companyLookup }}/description" },
              { "ROUTE": "{{ .Values.paths.companyLookup }}/companies" },
              { "ROUTE": "{{ .Values.paths.companyLookup }}/companies/*" }
            ]
          }
        ],
        "DEFACLS": [
          { "name": "admin_full", "acl": { "USEATTRIBUTES": "role_attr", "RIGHTS": ["ALL"], "ACCESS": "ALLOW" } }
        ],
        "DEFFORMULAS": [
          { "name": "is_admin", "formula": { "$eq": [{ "$attribute": { "CLAIM": "role" } }, { "$strVal": "admin" }] } }
        ],
        "rules": [
          { "USEACL": "admin_full", "USEOBJECTS": ["all_api"], "USEFORMULA": "is_admin" }
        ]
      }
    }

  trustList: |
    [
      {
        "issuer": "https://{{ .Values.host }}{{ .Values.paths.keycloak }}/realms/{{ .Values.keycloak.realm }}",
        "audience": "{{ .Values.environment.common.OIDC_AUDIENCE | default .Values.keycloak.secrets.client.name }}",
        "scopes": ["email", "profile"]
      }
    ]

  services: {}
    # Legacy per-service override location. Prefer `<service>.abac` instead.
    # Supported service keys:
    # aasDiscovery, aasRegistry, aasRepository, submodelRegistry,
    # submodelRepository, cdRepository, digitalTwinRegistry
