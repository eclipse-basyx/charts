# This is to override the chart name.
nameOverride: ""
fullnameOverride: ""
# This section builds out the service account more information can be found here: https://kubernetes.io/docs/concepts/security/service-accounts/
serviceAccount:
  # Specifies whether a service account should be created.
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: false
  # Annotations to add to the service account.
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template.
  name: ""

# This block is for setting up the ingress for more information can be found here: https://kubernetes.io/docs/concepts/services-networking/ingress/

# -- Expose the service via gateway-api HTTPRoute
# Requires Gateway API resources and suitable controller installed within the cluster
# (see: https://gateway-api.sigs.k8s.io/guides/)

instanceName: "example"
host: "basyx.example.com"

tls:
  enabled: true
  hosts:
    - "{{ .Values.host }}"

internal:
  CACertificates:
    trustStore:
      # Keep the default system trust directory in SSL_CERT_DIR.
      useDefaultCAs: true
      # Mount point for additional CA sources.
      mountPath: /etc/ssl/certs/custom
      # Optional chart-local directory whose files are projected into the trust store.
      # Supports templating, e.g. /config-files/certs/{{ .Values.instanceName }}
      chartFileDirectory: ""
      # Optional inline PEM bundle rendered into a generated ConfigMap.
      additionalCACertificates: ""
      # Optional existing Secret names projected into the trust store.
      extraSecrets: []
      # Optional existing ConfigMap names projected into the trust store.
      extraConfigMaps: []
  certificateIssuer:
    name: internal-issuer
    autocreateCa: false
    autocreateCaSecretName: internal-issuer-ca
    spec:
      ca:
        # references existing ca secret
        secretName: internal-issuer-ca


ingress:
  clusterIssuer: ""
  issuer: ""
  certificateIssuer:
    enabled: false
    name: ingress-issuer
    spec: {}

paths:
  dashboard: /aas-dataspace-dashboard
  aasDiscovery: /aas-discovery
  aasRegistry: /aas-registry
  aasRepository: /aas-repository
  submodelRegistry: /submodel-registry
  submodelRepository: /submodel-repo
  cdRepository: /cd-repository
  companyLookup: /company-lookup
  confSubmodelRepository: /conf-submodel-repo
  aasWebUi: /aas-gui/
  aasWebUiBasePath: /aas-gui
  keycloak: /identity-management
  digitalTwinRegistry: /digital-twin-registry

environment:
  common:
    # Restrict to specific origins in production, e.g.: "https://my-app.example.com"
    # Never combine wildcard '*' with CORS_ALLOWEDCREDENTIALS: true (CSRF risk, browsers block it).
    CORS_ALLOWEDORIGINS: ""
    CORS_ALLOWEDHEADERS: "*"
    CORS_ALLOWEDCREDENTIALS: false
    CORS_ALLOWEDMETHODS: GET,POST,PUT,PATCH,DELETE,OPTIONS
    POSTGRES_MAXOPENCONNECTIONS: 500
    POSTGRES_MAXIDLECONNECTIONS: 500
    POSTGRES_CONNMAXLIFETIMEMINUTES: 5
    SERVER_STRICTVERIFICATION: permissive
    OIDC_AUDIENCE: discovery-service
    ABAC_ENABLED: false


# HTTP proxy settings for outbound connections from all services.
# Set to empty string "" to disable. noProxy should include cluster-internal
# domains to avoid proxying internal traffic, e.g.: ".svc.cluster.local,keycloak"
proxy:
  http: ""
  https: ""
  noProxy: "localhost,127.0.0.1,.svc.cluster.local"

configurationService:
  # The BaSyx Go Configuration Service initializes and migrates the shared
  # PostgreSQL schema before DB-backed runtime services use it.
  enabled: true
  image:
    repository: eclipsebasyx/basyxconfigurationservice-go
    pullPolicy: Always
    tag: ""
    digest: ""
  imagePullSecrets: []
  command: []
  args: []
  waitForDatabase:
    enabled: true
    image:
      repository: ghcr.io/cloudnative-pg/postgresql
      pullPolicy: IfNotPresent
      tag: "18.3-system-trixie"
      digest: ""
    intervalSeconds: 5
    timeoutSeconds: 600
    resources: {}
  hook:
    enabled: true
    # post-install is needed because the CNPG database is created by this chart.
    # pre-upgrade runs migrations before new runtime pods start.
    events:
      - post-install
      - pre-upgrade
    weight: "-10"
    deletePolicy:
      - before-hook-creation
    annotations: {}
  backoffLimit: 12
  activeDeadlineSeconds: 900
  ttlSecondsAfterFinished: 600
  restartPolicy: OnFailure
  podAnnotations: {}
  podLabels: {}
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

keycloak:
  enabled: false
  realm: basyx
  webUiClientId: basyx-ui
  initJob:
    image:
      repository: peterevans/curl-jq
      pullPolicy: Always
      tag: "1.0"
      digest: ""
  tests:
    realmCheck:
      image:
        repository: curlimages/curl
        pullPolicy: Always
        tag: 8.19.0
        digest: ""
  initialization:
    userProfile:
      unmanagedAttributePolicy: ADMIN_EDIT

    roles:
      - admin
      - viewer

    clients:

      - clientId: basyx-ui
        publicClient: true
        standardFlowEnabled: true
        implicitFlowEnabled: true

        redirectUris:
          - "https://{{ .Values.host }}{{ .Values.paths.aasWebUiBasePath }}/*"

        webOrigins:
          - "+"

        attributes:
          post.logout.redirect.uris: "https://{{ .Values.host }}{{ .Values.paths.aasWebUiBasePath }}/*"
          oauth2.device.authorization.grant.enabled: "true"
        protocolMappers:
          - name: Role Mapper
            protocol: openid-connect
            protocolMapper: oidc-usermodel-attribute-mapper
            consentRequired: false
            config:
              aggregate.attrs: "false"
              introspection.token.claim: "true"
              multivalued: "false"
              userinfo.token.claim: "true"
              user.attribute: role
              id.token.claim: "true"
              lightweight.claim: "false"
              access.token.claim: "true"
              claim.name: role
              jsonType.label: String
          - name: discovery-service-aud-mapper
            protocol: openid-connect
            protocolMapper: oidc-audience-mapper
            consentRequired: false
            config:
              included.client.audience: discovery-service
              id.token.claim: "false"
              lightweight.claim: "false"
              introspection.token.claim: "true"
              access.token.claim: "true"
              userinfo.token.claim: "false"
          - name: Clearance Mapper
            protocol: openid-connect
            protocolMapper: oidc-usermodel-attribute-mapper
            consentRequired: false
            config:
              aggregate.attrs: "false"
              introspection.token.claim: "true"
              multivalued: "false"
              userinfo.token.claim: "true"
              user.attribute: clear
              id.token.claim: "true"
              lightweight.claim: "false"
              access.token.claim: "true"
              claim.name: clear
              jsonType.label: String

      - clientId: discovery-service
        serviceAccountsEnabled: true

    users:
      - username: d4e.admin
        enabled: true
        email: d4e_admin@example.com
        firstName: D4E
        lastName: Admin
        emailVerified: true
        attributes:
          role:
            - admin
          clear:
            - admin
        roles:
          - admin
        credentials:
          - type: password
            value: changeit
            temporary: false
  environment:
    KC_PROXY: edge
    jgroups_dns_query: keycloak
    PROXY_ADDRESS_FORWARDING: true
    KC_HEALTH_ENABLED: true
    KC_HTTP_ENABLED: true
    KC_DB: postgres
    KC_HTTP_MANAGEMENT_ENABLED: "true"
    KC_PROXY_HEADERS: xforwarded
    KC_HOSTNAME_STRICT: "false"
    KC_HOSTNAME_STRICT_BACKCHANNEL: "false"
  monitoring:
    enabled: true
  secrets:
    # name for the creditals secret
    name: "keycloak-credentials"
    # configures admin user for keycloak
    admin:
      username: changme
      password: changme
    # configures client credentials for keycloak
    client:
      name: basyx-ui
      clientPassword: changme
  replicaCount: 1
  image:
    repository: keycloak/keycloak
    pullPolicy: Always
    tag: 26.5
  imagePullSecrets: []
  nameOverride: "keycloak"
  fullnameOverride: "keycloak"
  serviceAccount:
    # Specifies whether a service account should be created
    create: true
    # Automatically mount a ServiceAccount's API credentials?
    automount: false
    # Annotations to add to the service account
    annotations: {}
    # The name of the service account to use.
    # If not set and create is true, a name is generated using the fullname template
    name: "keycloak"
  podAnnotations: {}
  podLabels: {}
  # Keycloak runs as root by default. Consult the official image documentation
  # before restricting the security context for production deployments.
  podSecurityContext: {}
  securityContext: {}
  service:
    type: ClusterIP
    port: 9096
  managementPort: 9000

  ingress:
    enabled: true
    className: nginx
    annotations: {}
    hosts:
      - host: "{{ .Values.host }}"
        paths:
          - path: "{{ .Values.paths.keycloak }}"
            pathType: ImplementationSpecific

  resources:
    {}
    # limits:
    #   cpu: 100m
    #   memory: 128Mi
    # requests:
    #   cpu: 100m
    #   memory: 128Mi
  startupProbe:
    httpGet:
      path: "{{ .Values.paths.keycloak }}/health/started"
      port: management
    failureThreshold: 30
    periodSeconds: 10
  livenessProbe:
    httpGet:
      path: "{{ .Values.paths.keycloak }}/health/live"
      port: management
    initialDelaySeconds: 0
    periodSeconds: 10
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: "{{ .Values.paths.keycloak }}/health/ready"
      port: management
    initialDelaySeconds: 0
    periodSeconds: 5
    failureThreshold: 3
  command:
    - "/opt/keycloak/bin/kc.sh"
    - "start"
    - "--http-enabled=true"
    - "--http-port=9096"
    - "--hostname-strict=false"
  nodeSelector: {}
  tolerations: []
  affinity: {}

