suite: backend deployments
release:
  name: basyx
templates:
  - templates/aas-repository/deployment.yaml
  - templates/aas-environment/deployment.yaml
  - templates/dpp-api/deployment.yaml
  - templates/company-lookup/deployment.yaml
  - templates/keycloak/deployment.yaml
tests:
  - it: mounts ABAC config and rollout checksum for aas repository
    template: templates/aas-repository/deployment.yaml
    set:
      aasRepository.enabled: true
      abac.enabled: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: ABAC_ENABLED
            value: "true"
          count: 1
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: ABAC_MODELPATH
            value: /security_env/access-rules.json
          count: 1
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: OIDC_TRUSTLISTPATH
            value: /security_env/trustlist.json
          count: 1
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: abac-config
            mountPath: /security_env
            readOnly: true
          count: 1
      - exists:
          path: spec.template.metadata.annotations["checksum/abac-config"]

  - it: prefers image digests over tags for aas repository
    template: templates/aas-repository/deployment.yaml
    set:
      aasRepository.enabled: true
      aasRepository.image.digest: sha256:0123456789abcdef
      aasRepository.image.tag: ignored
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: eclipsebasyx/aasrepository-go@sha256:0123456789abcdef

  - it: renders backend health probes below the configured service context path
    template: templates/aas-repository/deployment.yaml
    set:
      aasRepository.enabled: true
    asserts:
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /aas-repository/health
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /aas-repository/health

  - it: renders service-local runtime overrides for shared backend deployments
    template: templates/aas-repository/deployment.yaml
    set:
      aasRepository.enabled: true
      history.mode: audit
      aasRepository.history.mode: api
      aasRepository.history.evidence.enabled: true
      aasRepository.eventing.topicPrefix: aas-repository-events
      aasRepository.general.aasPreconfigPaths[0]: /aas/preconfigured
      aasRepository.general.aasxMaxPartCount: 12000
      aasRepository.general.aasxMaxTotalExpandedSizeBytes: 268435456
      aasRepository.general.bulkBatchLimit: 250
      aasRepository.server.readTimeoutSeconds: 120
      aasRepository.server.shutdownTimeoutSeconds: 20
      aasRepository.abac.policyFileImport: if_missing
      aasRepository.abac.policyScope: aas-repository-scope
      aasRepository.abac.managementApi.enabled: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: BASYX_HISTORY_MODE
            value: api
          count: 1
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: BASYX_HISTORY_EVIDENCE_ENABLED
            value: "true"
          count: 1
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: BASYX_EVENTING_TOPIC_PREFIX
            value: aas-repository-events
          count: 1
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: GENERAL_AAS_PRECONFIG_PATHS
            value: /aas/preconfigured
          count: 1
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: GENERAL_AASXMAXPARTCOUNT
            value: "12000"
          count: 1
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: GENERAL_AASXMAXTOTALEXPANDEDSIZEBYTES
            value: "268435456"
          count: 1
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: GENERAL_BULK_BATCH_LIMIT
            value: "250"
          count: 1
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SERVER_READ_TIMEOUT_SECONDS
            value: "120"
          count: 1
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SERVER_SHUTDOWN_TIMEOUT_SECONDS
            value: "20"
          count: 1
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: ABAC_POLICY_FILE_IMPORT
            value: if_missing
          count: 1
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: ABAC_POLICY_SCOPE
            value: aas-repository-scope
          count: 1
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: ABAC_MANAGEMENT_API_ENABLED
            value: "true"
          count: 1

  - it: lets raw service environment override structured service runtime config
    template: templates/aas-repository/deployment.yaml
    set:
      aasRepository.enabled: true
      aasRepository.history.mode: api
      aasRepository.environment.BASYX_HISTORY_MODE: audit
      aasRepository.general.bulkBatchLimit: 250
      aasRepository.environment.GENERAL_BULK_BATCH_LIMIT: 100
      aasRepository.general.aasxMaxPartCount: 12000
      aasRepository.environment.GENERAL_AASXMAXPARTCOUNT: 11000
      aasRepository.server.readTimeoutSeconds: 120
      aasRepository.environment.SERVER_READ_TIMEOUT_SECONDS: 90
      aasRepository.abac.policyScope: structured-scope
      aasRepository.environment.ABAC_POLICY_SCOPE: raw-scope
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: BASYX_HISTORY_MODE
            value: audit
          count: 1
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: GENERAL_BULK_BATCH_LIMIT
            value: "100"
          count: 1
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: GENERAL_AASXMAXPARTCOUNT
            value: "11000"
          count: 1
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SERVER_READ_TIMEOUT_SECONDS
            value: "90"
          count: 1
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: ABAC_POLICY_SCOPE
            value: raw-scope
          count: 1

  - it: renders numeric keycloak image tags cleanly
    template: templates/keycloak/deployment.yaml
    set:
      keycloak.enabled: true
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: keycloak/keycloak:26.5

  - it: probes keycloak health on the management port below the relative path
    template: templates/keycloak/deployment.yaml
    set:
      keycloak.enabled: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            name: management
            containerPort: 9000
            protocol: TCP
          count: 1
      - equal:
          path: spec.template.spec.containers[0].startupProbe.httpGet.path
          value: /identity-management/health/started
      - equal:
          path: spec.template.spec.containers[0].startupProbe.httpGet.port
          value: management
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /identity-management/health/ready
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.port
          value: management

  - it: renders company lookup as an optional BaSyx Go backend
    template: templates/company-lookup/deployment.yaml
    set:
      companyLookup.enabled: true
      abac.enabled: true
    asserts:
      - equal:
          path: spec.template.spec.containers[0].name
          value: company-lookup
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: "^eclipsebasyx/companylookup-go:[^:]+$"
      - notMatchRegex:
          path: spec.template.spec.containers[0].image
          pattern: ":SNAPSHOT$"
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 5080
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SERVER_CONTEXTPATH
            value: /company-lookup
          count: 1
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: ABAC_ENABLED
            value: "true"
          count: 1

  - it: renders aas environment as an optional BaSyx Go backend
    template: templates/aas-environment/deployment.yaml
    set:
      aasEnvironment.enabled: true
      abac.enabled: true
    asserts:
      - equal:
          path: spec.template.spec.containers[0].name
          value: aas-environment
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: "^eclipsebasyx/aasenvironment-go:[^:]+$"
      - notMatchRegex:
          path: spec.template.spec.containers[0].image
          pattern: ":SNAPSHOT$"
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 8082
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SERVER_CONTEXTPATH
            value: /aas-environment
          count: 1
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: GENERAL_AASREGISTRYINTEGRATION
            value: "true"
          count: 1
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: GENERAL_SUBMODELREGISTRYINTEGRATION
            value: "true"
          count: 1
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: GENERAL_DISCOVERYINTEGRATION
            value: "true"
          count: 1
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: GENERAL_EXTERNALURL
            value: https://basyx.example.com/aas-environment
          count: 1
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: ABAC_ENABLED
            value: "true"
          count: 1

  - it: renders dpp api as an optional BaSyx Go backend
    template: templates/dpp-api/deployment.yaml
    set:
      dppApi.enabled: true
      abac.enabled: true
    asserts:
      - equal:
          path: spec.template.spec.containers[0].name
          value: dpp-api
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: "^eclipsebasyx/dppapi-go:[^:]+$"
      - notMatchRegex:
          path: spec.template.spec.containers[0].image
          pattern: ":SNAPSHOT$"
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 8080
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SERVER_CONTEXTPATH
            value: /dpp-api
          count: 1
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: BASYX_HISTORY_MODE
            value: audit
          count: 1
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: BASYX_AUDIT_IDENTITY_MODE
            value: extended
          count: 1
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: ABAC_ENABLED
            value: "true"
          count: 1
