suite: config and ingress
release:
  name: basyx
templates:
  - templates/secret.yaml
  - templates/aas-web-gui/configmap.yaml
  - templates/aas-web-gui/configmap-infrastructure.yaml
  - templates/aas-web-gui/configmap-logos.yaml
  - templates/aas-web-gui/deployment.yaml
  - templates/aas-discovery/deployment.yaml
  - templates/aas-discovery/ingress.yaml
  - templates/aas-environment/ingress.yaml
  - templates/dpp-api/ingress.yaml
  - templates/company-lookup/ingress.yaml
tests:
  - it: renders the common secret with derived oidc issuer and ssl cert dir
    template: templates/secret.yaml
    set:
      aasDiscovery.enabled: true
    documentSelector:
      path: metadata.name
      value: basyx-common-config
    asserts:
      - equal:
          path: stringData.OIDC_ISSUER
          value: https://basyx.example.com/identity-management/realms/basyx
      - equal:
          path: stringData.SSL_CERT_DIR
          value: /etc/ssl/certs
      - equal:
          path: stringData.OIDC_AUDIENCE
          value: discovery-service
      - equal:
          path: stringData.SERVER_READ_HEADER_TIMEOUT_SECONDS
          value: "15"
      - equal:
          path: stringData.SERVER_READ_TIMEOUT_SECONDS
          value: "300"
      - equal:
          path: stringData.SERVER_WRITE_TIMEOUT_SECONDS
          value: "300"
      - equal:
          path: stringData.SERVER_IDLE_TIMEOUT_SECONDS
          value: "60"
      - equal:
          path: stringData.SERVER_SHUTDOWN_TIMEOUT_SECONDS
          value: "10"

  - it: renders structured BaSyx runtime configuration into the common secret
    template: templates/secret.yaml
    documentSelector:
      path: metadata.name
      value: basyx-common-config
    set:
      aasDiscovery.enabled: true
      general.trustProxyHeaders: true
      general.bulkBatchLimit: 500
      general.aasPreconfigPaths[0]: /app/preconfiguration
      server.readHeaderTimeoutSeconds: 20
      server.readTimeoutSeconds: 600
      server.writeTimeoutSeconds: 700
      server.idleTimeoutSeconds: 80
      server.shutdownTimeoutSeconds: 30
      abac.policyFileImport: if_missing
      abac.policyScope: shared-policy-scope
      abac.managementApi.enabled: true
      history.mode: audit
      history.fullSnapshotInterval: 5
      history.immutability: postgres_guarded
      history.auditIdentityMode: extended
      history.evidence.enabled: true
      history.evidence.provider: s3
      history.evidence.bucket: basyx-history-evidence
      history.evidence.prefix: history-evidence
      history.evidence.endpoint: http://minio:9000
      history.evidence.pathStyle: true
      history.evidence.retentionMode: compliance
      history.evidence.retentionDays: 7
      eventing.topicPrefix: custom-basyx
    asserts:
      - equal:
          path: stringData.GENERAL_TRUSTPROXYHEADERS
          value: "true"
      - equal:
          path: stringData.GENERAL_AAS_PRECONFIG_PATHS
          value: /app/preconfiguration
      - equal:
          path: stringData.GENERAL_BULK_BATCH_LIMIT
          value: "500"
      - equal:
          path: stringData.SERVER_READ_HEADER_TIMEOUT_SECONDS
          value: "20"
      - equal:
          path: stringData.SERVER_READ_TIMEOUT_SECONDS
          value: "600"
      - equal:
          path: stringData.SERVER_WRITE_TIMEOUT_SECONDS
          value: "700"
      - equal:
          path: stringData.SERVER_IDLE_TIMEOUT_SECONDS
          value: "80"
      - equal:
          path: stringData.SERVER_SHUTDOWN_TIMEOUT_SECONDS
          value: "30"
      - equal:
          path: stringData.ABAC_POLICY_FILE_IMPORT
          value: if_missing
      - equal:
          path: stringData.ABAC_POLICY_SCOPE
          value: shared-policy-scope
      - equal:
          path: stringData.ABAC_MANAGEMENT_API_ENABLED
          value: "true"
      - equal:
          path: stringData.BASYX_HISTORY_MODE
          value: audit
      - equal:
          path: stringData.BASYX_HISTORY_FULL_SNAPSHOT_INTERVAL
          value: "5"
      - equal:
          path: stringData.BASYX_HISTORY_IMMUTABILITY
          value: postgres_guarded
      - equal:
          path: stringData.BASYX_AUDIT_IDENTITY_MODE
          value: extended
      - equal:
          path: stringData.BASYX_HISTORY_EVIDENCE_ENABLED
          value: "true"
      - equal:
          path: stringData.BASYX_HISTORY_EVIDENCE_PROVIDER
          value: s3
      - equal:
          path: stringData.BASYX_HISTORY_EVIDENCE_BUCKET
          value: basyx-history-evidence
      - equal:
          path: stringData.BASYX_HISTORY_EVIDENCE_PREFIX
          value: history-evidence
      - equal:
          path: stringData.BASYX_HISTORY_EVIDENCE_ENDPOINT
          value: http://minio:9000
      - equal:
          path: stringData.BASYX_HISTORY_EVIDENCE_PATH_STYLE
          value: "true"
      - equal:
          path: stringData.BASYX_HISTORY_EVIDENCE_RETENTION_MODE
          value: compliance
      - equal:
          path: stringData.BASYX_HISTORY_EVIDENCE_RETENTION_DAYS
          value: "7"
      - equal:
          path: stringData.BASYX_EVENTING_TOPIC_PREFIX
          value: custom-basyx

  - it: lets environment.common override structured runtime configuration
    template: templates/secret.yaml
    documentSelector:
      path: metadata.name
      value: basyx-common-config
    set:
      aasDiscovery.enabled: true
      history.mode: audit
      environment.common.BASYX_HISTORY_MODE: api
      general.bulkBatchLimit: 500
      environment.common.GENERAL_BULK_BATCH_LIMIT: 250
      server.readTimeoutSeconds: 600
      environment.common.SERVER_READ_TIMEOUT_SECONDS: 120
      abac.policyScope: structured-scope
      environment.common.ABAC_POLICY_SCOPE: raw-scope
    asserts:
      - equal:
          path: stringData.BASYX_HISTORY_MODE
          value: api
      - equal:
          path: stringData.GENERAL_BULK_BATCH_LIMIT
          value: "250"
      - equal:
          path: stringData.SERVER_READ_TIMEOUT_SECONDS
          value: "120"
      - equal:
          path: stringData.ABAC_POLICY_SCOPE
          value: raw-scope

  - it: renders the web ui infrastructure with keycloak issuer and client id
    template: templates/aas-web-gui/configmap-infrastructure.yaml
    set:
      aasWebGui.enabled: true
    documentSelector:
      path: metadata.name
      value: basyx-aas-web-ui-infrastructure
    asserts:
      - matchRegex:
          path: data["basyx-infra.yml"]
          pattern: "clientId: 'basyx-ui'"
      - matchRegex:
          path: data["basyx-infra.yml"]
          pattern: 'issuer: https://basyx\.example\.com/identity-management/realms/basyx'
      - matchRegex:
          path: data["basyx-infra.yml"]
          pattern: 'baseUrl: https://basyx\.example\.com/aas-repository'

  - it: renders Catena-X web ui infrastructure from example values
    template: templates/aas-web-gui/configmap-infrastructure.yaml
    values:
      - ../../../values/values.catena-x.example.yaml
    documentSelector:
      path: metadata.name
      value: basyx-aas-web-ui-infrastructure
    asserts:
      - matchRegex:
          path: data["basyx-infra.yml"]
          pattern: 'default: catena-x'
      - matchRegex:
          path: data["basyx-infra.yml"]
          pattern: 'template: catena-x'
      - matchRegex:
          path: data["basyx-infra.yml"]
          pattern: 'digitalTwinRegistry:'
      - matchRegex:
          path: data["basyx-infra.yml"]
          pattern: 'baseUrl: https://basyx\.example\.com/digital-twin-registry'
      - matchRegex:
          path: data["basyx-infra.yml"]
          pattern: 'submodelService:'
      - matchRegex:
          path: data["basyx-infra.yml"]
          pattern: 'baseUrl: https://basyx\.example\.com/submodel-repo'
      - notMatchRegex:
          path: data["basyx-infra.yml"]
          pattern: 'aasRepository:'
      - notMatchRegex:
          path: data["basyx-infra.yml"]
          pattern: 'conceptDescriptionRepository:'
      - matchRegex:
          path: data["basyx-infra.yml"]
          pattern: 'type: oauth2'

  - it: renders Catena-X web ui runtime settings from example values
    template: templates/aas-web-gui/configmap.yaml
    values:
      - ../../../values/values.catena-x.example.yaml
    documentSelector:
      path: metadata.name
      value: basyx-aas-web-ui-config
    asserts:
      - equal:
          path: data.START_PAGE_ROUTE_NAME
          value: CatenaXplorer

  - it: mounts common config and custom ca into aas discovery
    template: templates/aas-discovery/deployment.yaml
    set:
      aasDiscovery.enabled: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].envFrom
          content:
            secretRef:
              name: basyx-common-config
          count: 1
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: certs
            mountPath: /etc/ssl/certs/ca.crt
            subPath: ca.crt
            readOnly: true
          count: 1
      - contains:
          path: spec.template.spec.volumes
          content:
            name: certs
            secret:
              secretName: internal-issuer-ca
          count: 1

  - it: renders discovery health probes below the configured service context path
    template: templates/aas-discovery/deployment.yaml
    set:
      aasDiscovery.enabled: true
    asserts:
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /aas-discovery/health
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /aas-discovery/health

  - it: renders service-local runtime overrides for aas discovery
    template: templates/aas-discovery/deployment.yaml
    set:
      aasDiscovery.enabled: true
      history.mode: audit
      aasDiscovery.history.mode: api
      aasDiscovery.eventing.topicPrefix: discovery-events
      aasDiscovery.general.trustProxyHeaders: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: BASYX_HISTORY_MODE
            value: api
          count: 1
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: BASYX_EVENTING_TOPIC_PREFIX
            value: discovery-events
          count: 1
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: GENERAL_TRUSTPROXYHEADERS
            value: "true"
          count: 1

  - it: probes the web ui at its configured base path
    template: templates/aas-web-gui/deployment.yaml
    set:
      aasWebGui.enabled: true
    asserts:
      - exists:
          path: spec.template.metadata.annotations["checksum/aas-web-gui-config"]
      - exists:
          path: spec.template.metadata.annotations["checksum/aas-web-gui-infrastructure"]
      - exists:
          path: spec.template.metadata.annotations["checksum/aas-web-gui-logos"]
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /aas-gui/
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /aas-gui/

  - it: renders the discovery ingress with the configured host and path
    template: templates/aas-discovery/ingress.yaml
    set:
      aasDiscovery.enabled: true
    asserts:
      - equal:
          path: spec.rules[0].host
          value: basyx.example.com
      - equal:
          path: spec.rules[0].http.paths[0].path
          value: /aas-discovery
      - equal:
          path: spec.tls[0].secretName
          value: basyx-tls-secret

  - it: renders the company lookup ingress with its own path and port
    template: templates/company-lookup/ingress.yaml
    set:
      companyLookup.enabled: true
    asserts:
      - equal:
          path: spec.rules[0].host
          value: basyx.example.com
      - equal:
          path: spec.rules[0].http.paths[0].path
          value: /company-lookup
      - equal:
          path: spec.rules[0].http.paths[0].backend.service.port.number
          value: 5080

  - it: renders the aas environment ingress with its own path and port
    template: templates/aas-environment/ingress.yaml
    set:
      aasEnvironment.enabled: true
    asserts:
      - equal:
          path: spec.rules[0].host
          value: basyx.example.com
      - equal:
          path: spec.rules[0].http.paths[0].path
          value: /aas-environment
      - equal:
          path: spec.rules[0].http.paths[0].backend.service.port.number
          value: 8082

  - it: renders the dpp api ingress with its own path and port
    template: templates/dpp-api/ingress.yaml
    set:
      dppApi.enabled: true
    asserts:
      - equal:
          path: spec.rules[0].host
          value: basyx.example.com
      - equal:
          path: spec.rules[0].http.paths[0].path
          value: /dpp-api
      - equal:
          path: spec.rules[0].http.paths[0].backend.service.port.number
          value: 8080

  - it: renders the common secret for an aas environment only deployment
    template: templates/secret.yaml
    documentSelector:
      path: metadata.name
      value: basyx-common-config
    set:
      aasDiscovery.enabled: false
      aasRegistry.enabled: false
      aasRepository.enabled: false
      aasEnvironment.enabled: true
      dppApi.enabled: false
      submodelRegistry.enabled: false
      submodelRepository.enabled: false
      cdRepository.enabled: false
      digitalTwinRegistry.enabled: false
      companyLookup.enabled: false
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: stringData.ABAC_ENABLED
          value: "false"

  - it: renders the common secret for a dpp api only deployment
    template: templates/secret.yaml
    documentSelector:
      path: metadata.name
      value: basyx-common-config
    set:
      aasDiscovery.enabled: false
      aasRegistry.enabled: false
      aasRepository.enabled: false
      aasEnvironment.enabled: false
      dppApi.enabled: true
      submodelRegistry.enabled: false
      submodelRepository.enabled: false
      cdRepository.enabled: false
      digitalTwinRegistry.enabled: false
      companyLookup.enabled: false
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: stringData.ABAC_ENABLED
          value: "false"
