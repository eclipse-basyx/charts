suite: abac config
templates:
  - templates/abac-configmap.yaml
release:
  name: basyx
tests:
  - it: derives the default trust list from chart values
    set:
      aasRepository.enabled: true
      abac.enabled: true
    documentSelector:
      path: metadata.name
      value: basyx-aas-repository-abac-config
    asserts:
      - isKind:
          of: ConfigMap
      - matchRegex:
          path: data["trustlist.json"]
          pattern: '"issuer": "https://basyx\.example\.com/identity-management/realms/basyx"'
      - matchRegex:
          path: data["trustlist.json"]
          pattern: '"audience": "discovery-service"'
      - matchRegex:
          path: data["access-rules.json"]
          pattern: '"name": "admin_full"'
      - matchRegex:
          path: data["access-rules.json"]
          pattern: '"name": "all_api"'
      - matchRegex:
          path: data["access-rules.json"]
          pattern: '"ROUTE": "/concept-descriptions/\*"'
      - matchRegex:
          path: data["access-rules.json"]
          pattern: '"ROUTE": "/aas-registry/shell-descriptors"'
      - matchRegex:
          path: data["access-rules.json"]
          pattern: '"ROUTE": "/cd-repository/concept-descriptions/\*"'
      - notMatchRegex:
          path: data["access-rules.json"]
          pattern: '"ROUTE": "/\\*"'
      - matchRegex:
          path: data["access-rules.json"]
          pattern: '"USEFORMULA": "is_admin"'

  - it: prefers service-local ABAC overrides over global defaults
    values:
      - fixtures/service_local_abac_override.yaml
    documentSelector:
      path: metadata.name
      value: basyx-aas-repository-abac-config
    asserts:
      - matchRegex:
          path: data["access-rules.json"]
          pattern: '"source":"repository"'
      - matchRegex:
          path: data["trustlist.json"]
          pattern: 'repo\.example/realms/basyx'
      - notMatchRegex:
          path: data["trustlist.json"]
          pattern: 'global\.example/realms/basyx'

  - it: keeps the global ABAC defaults for other services
    values:
      - fixtures/service_local_abac_override.yaml
    documentSelector:
      path: metadata.name
      value: basyx-aas-registry-abac-config
    asserts:
      - matchRegex:
          path: data["access-rules.json"]
          pattern: '"source":"global"'
      - matchRegex:
          path: data["trustlist.json"]
          pattern: 'global\.example/realms/basyx'
      - notMatchRegex:
          path: data["trustlist.json"]
          pattern: 'repo\.example/realms/basyx'

  - it: renders ABAC configuration for company lookup when enabled
    set:
      companyLookup.enabled: true
      abac.enabled: true
    documentSelector:
      path: metadata.name
      value: basyx-company-lookup-abac-config
    asserts:
      - isKind:
          of: ConfigMap
      - matchRegex:
          path: data["access-rules.json"]
          pattern: '"name": "admin_full"'
      - matchRegex:
          path: data["trustlist.json"]
          pattern: '"audience": "discovery-service"'

  - it: renders ABAC configuration for aas environment when enabled
    set:
      aasEnvironment.enabled: true
      abac.enabled: true
    documentSelector:
      path: metadata.name
      value: basyx-aas-environment-abac-config
    asserts:
      - isKind:
          of: ConfigMap
      - matchRegex:
          path: data["access-rules.json"]
          pattern: '"name": "admin_full"'
      - matchRegex:
          path: data["trustlist.json"]
          pattern: '"audience": "discovery-service"'

  - it: renders ABAC configuration for dpp api when enabled
    set:
      dppApi.enabled: true
      abac.enabled: true
    documentSelector:
      path: metadata.name
      value: basyx-dpp-api-abac-config
    asserts:
      - isKind:
          of: ConfigMap
      - matchRegex:
          path: data["access-rules.json"]
          pattern: '"name": "admin_full"'
      - matchRegex:
          path: data["access-rules.json"]
          pattern: '"ROUTE": "/v1/dpps/\*"'
      - matchRegex:
          path: data["access-rules.json"]
          pattern: '"ROUTE": "/dpp-api/v1/dpps/\*"'
      - matchRegex:
          path: data["trustlist.json"]
          pattern: '"audience": "discovery-service"'

  - it: renders Catena-X Digital Twin Registry ABAC rules from example values
    values:
      - ../../../values/values.catena-x.example.yaml
    documentSelector:
      path: metadata.name
      value: basyx-digital-twin-registry-abac-config
    asserts:
      - isKind:
          of: ConfigMap
      - matchRegex:
          path: data["access-rules.json"]
          pattern: '"CLAIM": "Edc-Bpn"'
      - matchRegex:
          path: data["access-rules.json"]
          pattern: '"PUBLIC_READABLE"'
      - matchRegex:
          path: data["access-rules.json"]
          pattern: '\$aasdesc#submodelDescriptors\[\]\.supplementalSemanticIds\[\]\.keys\[\]\.value'
      - matchRegex:
          path: data["access-rules.json"]
          pattern: '"ROUTE": "/digital-twin-registry/lookup/shells"'
      - matchRegex:
          path: data["access-rules.json"]
          pattern: '"USEOBJECTS": \["all_shell_descriptors"\]'

  - it: renders Catena-X Submodel Repository ABAC rules from example values
    values:
      - ../../../values/values.catena-x.example.yaml
    documentSelector:
      path: metadata.name
      value: basyx-submodel-repository-abac-config
    asserts:
      - isKind:
          of: ConfigMap
      - matchRegex:
          path: data["access-rules.json"]
          pattern: '"CLAIM": "Edc-Bpn"'
      - matchRegex:
          path: data["access-rules.json"]
          pattern: '"PUBLIC_READABLE"'
      - matchRegex:
          path: data["access-rules.json"]
          pattern: '\$sme#supplementalSemanticIds\[\]\.keys\[\]\.value'
      - matchRegex:
          path: data["access-rules.json"]
          pattern: '"ROUTE": "/submodel-repo/query/submodels"'
