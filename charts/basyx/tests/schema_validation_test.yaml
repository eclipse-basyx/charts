suite: schema validation
templates:
  - templates/secret.yaml
tests:
  - it: fails when host is empty
    values:
      - fixtures/invalid_empty_host.yaml
    asserts:
      - failedTemplate:
          errorPattern: "host"

  - it: fails when keycloak client password is not a string
    values:
      - fixtures/invalid_keycloak_client_password.yaml
    asserts:
      - failedTemplate:
          errorPattern: "clientPassword"

  - it: fails when the keycloak path does not start with a slash
    values:
      - fixtures/invalid_keycloak_path.yaml
    asserts:
      - failedTemplate:
          errorPattern: "paths.keycloak"

  - it: fails when the aas environment path does not start with a slash
    values:
      - fixtures/invalid_aas_environment_path.yaml
    asserts:
      - failedTemplate:
          errorPattern: "paths.aasEnvironment"

  - it: fails when the dpp api path does not start with a slash
    values:
      - fixtures/invalid_dpp_api_path.yaml
    asserts:
      - failedTemplate:
          errorPattern: "paths.dppApi"

  - it: fails when history mode is unsupported
    values:
      - fixtures/invalid_history_mode.yaml
    asserts:
      - failedTemplate:
          errorPattern: "history.mode"

  - it: fails when history full snapshot interval is below one
    values:
      - fixtures/invalid_history_full_snapshot_interval.yaml
    asserts:
      - failedTemplate:
          errorPattern: "history.fullSnapshotInterval"

  - it: fails when history immutability mode is unsupported
    values:
      - fixtures/invalid_history_immutability.yaml
    asserts:
      - failedTemplate:
          errorPattern: "history.immutability"

  - it: fails when history audit identity mode is unsupported
    values:
      - fixtures/invalid_history_audit_identity_mode.yaml
    asserts:
      - failedTemplate:
          errorPattern: "history.auditIdentityMode"

  - it: fails when history evidence write timeout is below one
    values:
      - fixtures/invalid_history_evidence_write_timeout.yaml
    asserts:
      - failedTemplate:
          errorPattern: "history.evidence.writeTimeoutSeconds"

  - it: fails when bulk batch limit is below one
    values:
      - fixtures/invalid_general_bulk_batch_limit.yaml
    asserts:
      - failedTemplate:
          errorPattern: "general.bulkBatchLimit"

  - it: fails when server timeout is below one
    values:
      - fixtures/invalid_server_timeout.yaml
    asserts:
      - failedTemplate:
          errorPattern: "server.readTimeoutSeconds"

  - it: fails when service-local server timeout is below one
    values:
      - fixtures/invalid_service_server_timeout.yaml
    asserts:
      - failedTemplate:
          errorPattern: "aasRepository.server.shutdownTimeoutSeconds"

  - it: fails when external database has no existing secret
    values:
      - fixtures/invalid_external_database_missing_secret.yaml
    asserts:
      - failedTemplate:
          errorPattern: "database"

  - it: fails when inline external database password is empty
    values:
      - fixtures/invalid_external_database_empty_password.yaml
    asserts:
      - failedTemplate:
          errorPattern: "database"

  - it: fails when database type is unsupported
    values:
      - fixtures/invalid_database_type.yaml
    asserts:
      - failedTemplate:
          errorPattern: "database.type"

  - it: fails when ABAC policy scope contains unsupported characters
    values:
      - fixtures/invalid_abac_policy_scope.yaml
    asserts:
      - failedTemplate:
          errorPattern: "abac.policyScope"
