{{- if .Values.keycloak.enabled }}
{{- $defaultImage := dict "repository" "curlimages/curl" "tag" "8.21.0" "pullPolicy" "IfNotPresent" "digest" "" }}
{{- $configuredImage := dict }}
{{- with .Values.keycloak }}
{{- with .tests }}
{{- with .realmCheck }}
{{- with .image }}
{{- $configuredImage = . }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- $testImage := mergeOverwrite $defaultImage $configuredImage }}
apiVersion: v1
kind: Pod
metadata:
  name: {{ include "basyx-keycloak.fullname" . }}-realm-test
  labels:
    {{- include "basyx-keycloak.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: test
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: keycloak-realm-check
      image: {{ include "basyx.image" (dict "image" $testImage "root" .) | quote }}
      imagePullPolicy: {{ $testImage.pullPolicy }}
      command:
        - /bin/sh
        - -ec
      args:
        - >
          realm_url="http://{{ include "basyx-keycloak.fullname" . }}:{{ .Values.keycloak.service.port }}{{ .Values.paths.keycloak }}/realms/{{ .Values.keycloak.realm }}";
          echo "Checking ${realm_url}";
          body="$(curl -fsS "${realm_url}")";
          echo "${body}" | grep -q '"realm":"{{ .Values.keycloak.realm }}"'
{{- end }}
