{{- if .Values.submodelRegistry.enabled -}}
{{- if .Values.submodelRegistry.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "basyx-submodelRegistry.serviceAccountName" . }}
  labels:
    {{- include "basyx-submodelRegistry.labels" . | nindent 4 }}
  {{- with .Values.submodelRegistry.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.submodelRegistry.serviceAccount.automount }}
{{- end }}
{{- end }}