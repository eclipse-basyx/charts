{{- if .Values.submodelRegistry.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "basyx-submodelRegistry.fullname" . }}
  labels:
    {{- include "basyx-submodelRegistry.labels" . | nindent 4 }}
spec:
  type: {{ .Values.submodelRegistry.service.type }}
  ports:
    - port: {{ .Values.submodelRegistry.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "basyx-submodelRegistry.selectorLabels" . | nindent 4 }}
{{- end }}