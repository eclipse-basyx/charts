{{- if .Values.aasRegistry.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "basyx-aasRegistry.fullname" . }}
  labels:
    {{- include "basyx-aasRegistry.labels" . | nindent 4 }}
spec:
  type: {{ .Values.aasRegistry.service.type }}
  ports:
    - port: {{ .Values.aasRegistry.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "basyx-aasRegistry.selectorLabels" . | nindent 4 }}
{{- end }}