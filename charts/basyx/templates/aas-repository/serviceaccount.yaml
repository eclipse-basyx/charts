{{- if .Values.aasRepository.enabled -}}
{{- if .Values.aasRepository.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "basyx-aasRepository.serviceAccountName" . }}
  labels:
    {{- include "basyx-aasRepository.labels" . | nindent 4 }}
  {{- with .Values.aasRepository.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.aasRepository.serviceAccount.automount }}
{{- end }}
{{- end }}