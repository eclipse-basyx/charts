{{- if .Values.aasEnvironment.enabled -}}
{{- if .Values.aasEnvironment.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "basyx-aasEnvironment.serviceAccountName" . }}
  labels:
    {{- include "basyx-aasEnvironment.labels" . | nindent 4 }}
  {{- with .Values.aasEnvironment.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.aasEnvironment.serviceAccount.automount }}
{{- end }}
{{- end }}
