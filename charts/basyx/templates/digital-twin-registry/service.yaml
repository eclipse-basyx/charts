{{- if .Values.digitalTwinRegistry.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "basyx-digitalTwinRegistry.fullname" . }}
  labels:
    {{- include "basyx-digitalTwinRegistry.labels" . | nindent 4 }}
spec:
  type: {{ .Values.digitalTwinRegistry.service.type }}
  ports:
    - port: {{ .Values.digitalTwinRegistry.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "basyx-digitalTwinRegistry.selectorLabels" . | nindent 4 }}
{{- end }}