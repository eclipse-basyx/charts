{{- if .Values.aasWebGui.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "basyx-aasWebGui.fullname" . }}
  labels:
    {{- include "basyx-aasWebGui.labels" . | nindent 4 }}
spec:
  type: {{ .Values.aasWebGui.service.type }}
  ports:
    - port: {{ .Values.aasWebGui.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "basyx-aasWebGui.selectorLabels" . | nindent 4 }}
{{- end }}