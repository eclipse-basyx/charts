{{- if .Values.aasWebGui.enabled }}
{{- if .Values.aasWebGui.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "basyx-aasWebGui.serviceAccountName" . }}
  labels:
    {{- include "basyx-aasWebGui.labels" . | nindent 4 }}
  {{- with .Values.aasWebGui.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.aasWebGui.serviceAccount.automount }}
{{- end }}
{{- end }}