{{- if .Values.submodelRepository.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "basyx-submodelRepository.fullname" . }}
  labels:
    {{- include "basyx-submodelRepository.labels" . | nindent 4 }}
spec:
  type: {{ .Values.submodelRepository.service.type }}
  ports:
    - port: {{ .Values.submodelRepository.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "basyx-submodelRepository.selectorLabels" . | nindent 4 }}
{{- end }}