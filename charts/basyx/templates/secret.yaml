{{- if or .Values.aasDiscovery.enabled .Values.aasRegistry.enabled .Values.aasRepository.enabled .Values.submodelRegistry.enabled .Values.submodelRepository.enabled .Values.cdRepository.enabled .Values.companyLookup.enabled .Values.digitalTwinRegistry.enabled -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "basyx.fullname" . }}-common-config
  labels:
    {{- include "basyx.labels" . | nindent 4 }}
stringData:
  OIDC_ISSUER: "https://{{ .Values.host }}{{ .Values.paths.keycloak }}/realms/{{ .Values.keycloak.realm }}"
  # Include the system CA dir and optional custom CA mount for outbound TLS trust.
  SSL_CERT_DIR: {{ include "common.certs.sslCertDir" . | quote }}
  {{- range $key, $value := .Values.environment.common }}
  {{ $key }}: {{ tpl (print $value) $ | quote }}
  {{- end }}
{{- end }}
