{{- if .Values.keycloak.enabled }}
--- 
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: {{ .Values.keycloak.secrets.name }}
  namespace: {{ .Release.Namespace }}
stringData:
  admin: {{ .Values.keycloak.secrets.admin.username }}
  adminPassword: {{ .Values.keycloak.secrets.admin.password }}
  clientName: {{ .Values.keycloak.secrets.client.name }}
  clientPassword: {{ .Values.keycloak.secrets.client.clientPassword }}
{{ end }}
