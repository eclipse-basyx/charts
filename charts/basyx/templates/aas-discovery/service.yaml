{{- if .Values.aasDiscovery.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "basyx-aasDiscovery.fullname" . }}
  labels:
    {{- include "basyx-aasDiscovery.labels" . | nindent 4 }}
spec:
  type: {{ .Values.aasDiscovery.service.type }}
  ports:
    - port: {{ .Values.aasDiscovery.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "basyx-aasDiscovery.selectorLabels" . | nindent 4 }}
{{- end }}