{{- if .Values.aasDiscovery.enabled -}}
{{- if .Values.aasDiscovery.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "basyx-aasDiscovery.serviceAccountName" . }}
  labels:
    {{- include "basyx-aasDiscovery.labels" . | nindent 4 }}
  {{- with .Values.aasDiscovery.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.aasDiscovery.serviceAccount.automount }}
{{- end }}
{{- end }}
