{{- if .Values.companyLookup.enabled -}}
{{- if .Values.companyLookup.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "basyx-companyLookup.serviceAccountName" . }}
  labels:
    {{- include "basyx-companyLookup.labels" . | nindent 4 }}
  {{- with .Values.companyLookup.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.companyLookup.serviceAccount.automount }}
{{- end }}
{{- end }}
