{{- if .Values.dppApi.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "basyx-dppApi.fullname" . }}
  labels:
    {{- include "basyx-dppApi.labels" . | nindent 4 }}
spec:
  type: {{ .Values.dppApi.service.type }}
  ports:
    - port: {{ .Values.dppApi.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "basyx-dppApi.selectorLabels" . | nindent 4 }}
{{- end }}
